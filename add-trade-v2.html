
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Trade - Tradeva</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f5f5f5;
font-family:Inter,Arial,sans-serif;
}

.main{
max-width:760px;
margin:30px auto;
padding:0 15px;
}

.card{
background:white;
border:1px solid #e5e7eb;
border-radius:14px;
padding:22px;
margin-bottom:18px;
box-shadow:0 1px 3px rgba(0,0,0,.05);
}

.section-title{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
font-size:14px;
font-weight:700;
letter-spacing:.5px;
text-transform:uppercase;
color:#6b7280;
}

.section-title:after{
content:"";
flex:1;
height:1px;
background:#e5e7eb;
}

.grid-2{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

label{
display:block;
font-size:14px;
font-weight:600;
margin-bottom:6px;
}

input,
select,
textarea{
width:100%;
padding:12px 14px;
border:1px solid #d1d5db;
border-radius:8px;
font-size:15px;
background:white;
}

textarea{
height:120px;
resize:none;
}

.direction-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.long-btn{
background:#ecfdf5;
border:2px solid #10b981;
color:#047857;
padding:12px;
border-radius:8px;
font-weight:700;
cursor:pointer;
}

.short-btn{
background:white;
border:2px solid #e5e7eb;
color:#6b7280;
padding:12px;
border-radius:8px;
font-weight:700;
cursor:pointer;
}

.outcome-buttons{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

.outcome-buttons button{
padding:12px;
border:2px solid #e5e7eb;
background:white;
border-radius:8px;
font-weight:600;
cursor:pointer;
}

.save-btn{
width:100%;
height:52px;
border:none;
border-radius:10px;
background:#111827;
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.page-header{
margin-bottom:20px;
}

.page-header h1{
font-size:32px;
font-weight:700;
}

.page-header p{
color:#6b7280;
margin-top:5px;
}

@media(max-width:768px){

.grid-2{
grid-template-columns:1fr;
}

.direction-buttons{
grid-template-columns:1fr;
}

.outcome-buttons{
grid-template-columns:1fr;
}

}
</style>

</head>
<body>

<!-- We will paste HTML here -->

</body>
</html>
