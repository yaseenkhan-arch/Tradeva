
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Trade - Tradeva</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f5f5f5;
font-family:Inter,Arial,sans-serif;
}

.main{
max-width:760px;
margin:15px auto;
padding:0 15px;
}

.card{
background:white;
border:1px solid #e5e7eb;
border-radius:14px;
padding:22px;
margin-bottom:18px;
box-shadow:0 1px 3px rgba(0,0,0,.05);
}

.section-title{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
font-size:14px;
font-weight:700;
letter-spacing:.5px;
text-transform:uppercase;
color:#6b7280;
}

.section-title:after{
content:"";
flex:1;
height:1px;
background:#e5e7eb;
}

.grid-2{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

label{
display:block;
font-size:14px;
font-weight:600;
margin-bottom:6px;
}

input,
select,
textarea{
width:100%;
padding:12px 14px;
border:1px solid #d1d5db;
border-radius:8px;
font-size:15px;
background:white;
}

textarea{
height:120px;
resize:none;
}

.direction-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.long-btn{
background:#ecfdf5;
border:2px solid #10b981;
color:#047857;
padding:12px;
border-radius:8px;
font-weight:700;
cursor:pointer;
}

.short-btn{
background:white;
border:2px solid #e5e7eb;
color:#6b7280;
padding:12px;
border-radius:8px;
font-weight:700;
cursor:pointer;
}

.outcome-buttons{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

.outcome-buttons button{
padding:12px;
border:2px solid #e5e7eb;
background:white;
border-radius:8px;
font-weight:600;
cursor:pointer;
}

.save-btn{
width:100%;
height:52px;
border:none;
border-radius:10px;
background:#111827;
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.page-header{
margin-bottom:20px;
}

.page-header h1{
font-size:32px;
font-weight:700;
}

.page-header p{
color:#6b7280;
margin-top:5px;
}

@media(max-width:768px){

.grid-2{
grid-template-columns:1fr;
}

.direction-buttons{
grid-template-columns:1fr;
}

.outcome-buttons{
grid-template-columns:1fr;
}

}
</style>

</head>
<body>

<div class="main">

</div>

<!-- TRADE DETAILS -->

<div class="card">

<div class="section-title">
📈 Trade Details
</div>

<div class="grid-2">

<div>
<label>Date</label>
<input type="date">
</div>

<div>
<label>Pair</label>
<input type="text" placeholder="EURUSD">
</div>

</div>

<br>

<label>Direction</label>

<div class="direction-buttons">

<button class="long-btn">
▲ Buy / Long
</button>

<button class="short-btn">
▼ Sell / Short
</button>

</div>

<br>

<div class="grid-2">

<div>
<label>Entry</label>
<input type="number" placeholder="0.00000">
</div>

<div>
<label>Exit</label>
<input type="number" placeholder="0.00000">
</div>

<div>
<label>Stop Loss</label>
<input type="number" placeholder="0.00000">
</div>

<div>
<label>Take Profit</label>
<input type="number" placeholder="0.00000">
</div>

</div>

</div>

<!-- ANALYSIS -->

<div class="card">

<div class="section-title">
📊 Analysis
</div>

<div>
<label>Session</label>
<select>
<option>London</option>
<option>New York</option>
<option>Asian</option>
</select>
</div>

<br>

<div>
<label>Trade Type</label>
<select>
<option>Select type</option>
<option>ICT</option>
<option>Scalp</option>
<option>Swing</option>
</select>
</div>

<br>

<div>
<label>HTF Bias</label>
<select>
<option>Select bias</option>
<option>Bullish</option>
<option>Bearish</option>
</select>
</div>

</div>

<!-- RESULTS -->

<div class="card">

<div class="section-title">
📈 Results
</div>

<div class="grid-2">

<div>
<label>R:R</label>
<input type="number" placeholder="e.g. 2.5">
</div>

<div>
<label>Pips</label>
<input type="number" placeholder="e.g. 42">
</div>

</div>

<br>

<div>
<label>Time in Position</label>
<input type="text" placeholder="e.g. 2h 30m">
</div>

<br>

<label>Outcome</label>

<div class="outcome-buttons">

<button>✔ Win</button>

<button>✖ Loss</button>

<button>➖ B/E</button>

</div>

<br>

<div>
<label>P&L ($)</label>
<input type="number" placeholder="250">
</div>

</div>

<!-- EVIDENCE -->

<div class="card">

<div class="section-title">
📷 Evidence
</div>

<div>
<label>Entry Screenshot</label>
<input type="file">
</div>

<br>

<div>
<label>TradingView Link</label>
<input type="text">
</div>

</div>

<!-- NOTES -->

<div class="card">

<div class="section-title">
📝 Notes
</div>

<div>
<label>Trade Notes</label>

<textarea placeholder="Describe your setup, psychology, execution and lessons..."></textarea>

</div>

</div>

<button class="save-btn">
Save Trade
</button>

<br><br>

</div>
</body>
</html>
