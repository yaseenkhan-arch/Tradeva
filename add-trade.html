<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Trade - Tradeva</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:24px 16px;
}

.container{
max-width:680px;
margin:auto;
}

.page-title{
font-size:42px;
font-weight:700;
margin-bottom:8px;
}

.page-subtitle{
color:#6b7280;
margin-bottom:24px;
}

.card{
background:#fff;
border:1px solid #e5e7eb;
border-radius:14px;
padding:22px;
margin-bottom:20px;
}

.section-title{
display:flex;
align-items:center;
gap:10px;
font-size:14px;
font-weight:700;
text-transform:uppercase;
letter-spacing:.5px;
color:#6b7280;
margin-bottom:20px;
}

.section-title::after{
content:"";
height:1px;
background:#e5e7eb;
flex:1;
}

.grid-2{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

label{
display:block;
font-size:14px;
font-weight:600;
margin-bottom:6px;
}

input,
select{
width:100%;
height:44px;
padding:0 14px;
border:1px solid #d1d5db;
border-radius:8px;
font-size:14px;
background:white;
}

.direction-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.long-btn,
.short-btn{
height:44px;
border-radius:8px;
font-weight:700;
font-size:14px;
cursor:pointer;
}

.long-btn{
background:#ecfdf5;
border:2px solid #10b981;
color:#047857;
}

.short-btn{
background:white;
border:2px solid #e5e7eb;
color:#6b7280;
}

.mt{
margin-top:18px;
}

@media(max-width:640px){

.grid-2{
grid-template-columns:1fr 1fr;
}

}

</style>
</head>
<body>

<div class="container">

<h1 class="page-title">Add Trade</h1>
<p class="page-subtitle">
Manage and review your trading history.
</p>

<div class="card">

<div class="section-title">
📈 Trade Details
</div>

<div class="grid-2">

<div>
<label>Date</label>
<input type="date">
</div>

<div>
<label>Pair</label>
<input type="text" placeholder="EURUSD">
</div>

</div>

<div class="mt">

<label>Direction</label>

<div class="direction-buttons">

<button class="long-btn">
▲ Buy / Long
</button>

<button class="short-btn">
▼ Sell / Short
</button>

</div>

</div>

<div class="grid-2 mt">

<div>
<label>Entry</label>
<input type="number" placeholder="0.00000">
</div>

<div>
<label>Exit</label>
<input type="number" placeholder="0.00000">
</div>

<div>
<label>Stop Loss</label>
<input type="number" placeholder="0.00000">
</div>

<div>
<label>Take Profit</label>
<input type="number" placeholder="0.00000">
</div>

</div>

</div>

</div>

</body>
</html>
