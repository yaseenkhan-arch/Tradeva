<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tradeva - Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#111827;
padding:35px;
border-radius:20px;
box-shadow:0 0 30px rgba(37,99,235,0.15);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:90px;
height:auto;
}

h1{
color:white;
text-align:center;
margin-bottom:8px;
font-size:28px;
}

.subtitle{
text-align:center;
color:#94a3b8;
font-size:14px;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
background:#1f2937;
border:1px solid #374151;
border-radius:10px;
color:white;
font-size:15px;
}

input:focus{
outline:none;
border-color:#2563eb;
}

button{
width:100%;
padding:14px;
background:#2563eb;
border:none;
border-radius:10px;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.message{
margin-top:15px;
text-align:center;
font-size:14px;
}

.links{
display:flex;
justify-content:space-between;
margin-top:15px;
font-size:14px;
}

.links a{
color:#60a5fa;
text-decoration:none;
}

.footer{
margin-top:20px;
text-align:center;
color:#94a3b8;
}

.footer a{
color:#60a5fa;
text-decoration:none;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="logo-transparent.png" alt="Tradeva Logo">
</div>

<h1>Welcome Back</h1>

<p class="subtitle">
Login to your Tradeva account.
</p>

<form id="loginForm">

<input id="email" type="email" placeholder="Email Address" required>

<input id="password" type="password" placeholder="Password" required>

<button type="submit">
Login
</button>

<div id="message" class="message"></div>

</form>

<div class="links">
<a href="#" id="forgotPassword">Forgot Password?</a>
</div>

<div class="footer">
Don't have an account?
<a href="register.html">Register</a>
</div>

</div>

</body>
</html>
