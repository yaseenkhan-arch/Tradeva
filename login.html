<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tradeva - Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f8fafc;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:450px;
background:white;
padding:40px;
border-radius:24px;
box-shadow:
0 20px 60px rgba(0,0,0,0.08);
border:1px solid #e5e7eb;
}
  .logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:90px;
height:auto;
}

h1{
color:#111827;
text-align:center;
margin-bottom:8px;
font-size:32px;
font-weight:700;
}
.subtitle{
text-align:center;
color:#6b7280;
font-size:15px;
margin-bottom:30px;
}
  
input{
width:100%;
padding:15px;
margin-bottom:15px;
background:#ffffff;
border:1px solid #d1d5db;
border-radius:12px;
color:#111827;
font-size:15px;
}
  
input:focus{
outline:none;
border-color:#2563eb;
}

button{
width:100%;
padding:15px;
background:#2563eb;
border:none;
border-radius:12px;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1d4ed8;
}
  
.message{
margin-top:15px;
text-align:center;
font-size:14px;
}

.links{
display:flex;
justify-content:space-between;
margin-top:15px;
font-size:14px;
}

.links a{
color:#60a5fa;
text-decoration:none;
}

.footer{
margin-top:20px;
text-align:center;
color:#94a3b8;
}

.footer a{
color:#60a5fa;
text-decoration:none;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="logo-transparent.png" alt="Tradeva Logo">
</div>

<h1>Welcome Back</h1>

<p class="subtitle">
Login to your Tradeva account.
</p>

<form id="loginForm">

<input id="email" type="email" placeholder="Email Address" required>

<div style="position:relative;">

<input
id="password"
type="password"
placeholder="Password"
required>

<span
onclick="togglePassword()"
style="
position:absolute;
right:15px;
top:15px;
cursor:pointer;
font-size:18px;">
👁️
</span>

</div>
  
<button type="submit">
Login
</button>

<div id="message" class="message"></div>

</form>

<div class="links">
<a href="#" id="forgotPassword">Forgot Password?</a>
</div>

<div class="footer">
Don't have an account?
<a href="register.html">Register</a>
</div>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDsaMzX6_NlzwsD3ibeYghv3q8HTbytmmU",
authDomain: "tradeva-app.firebaseapp.com",
projectId: "tradeva-app",
storageBucket: "tradeva-app.firebasestorage.app",
messagingSenderId: "682302343296",
appId: "1:682302343296:web:9643bf7b4b6664482e3e65"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const form = document.getElementById("loginForm");
const message = document.getElementById("message");

form.addEventListener("submit", async (e) => {

e.preventDefault();

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try {

const userCredential =
await signInWithEmailAndPassword(
auth,
email,
password
);

if(!userCredential.user.emailVerified){

message.style.color = "#ef4444";
message.innerText =
"Please verify your email before logging in.";

return;

}

message.style.color = "#22c55e";
message.innerText = "Login successful...";

setTimeout(() => {
window.location.href = "dashboard.html";
}, 1000);

}
catch(error){

message.style.color = "#ef4444";
message.innerText = error.message;

}

});

document.getElementById("forgotPassword")
.addEventListener("click", async (e) => {

e.preventDefault();

const email =
document.getElementById("email").value;

if(!email){

message.style.color = "#ef4444";
message.innerText =
"Enter your email first.";

return;

}

try{

await sendPasswordResetEmail(
auth,
email
);

message.style.color = "#22c55e";
message.innerText =
"Password reset email sent.";

}
catch(error){

message.style.color = "#ef4444";
message.innerText = error.message;

}

});

</script>
<script>

function togglePassword(){

const password =
document.getElementById("password");

if(password.type === "password"){
password.type = "text";
}
else{
password.type = "password";
}

}

</script>
  /body>
</html>
