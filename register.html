
<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tradeva - Create Account</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#111827;
padding:35px;
border-radius:20px;
box-shadow:0 0 30px rgba(37,99,235,0.15);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:90px;
height:auto;
}

h1{
color:white;
text-align:center;
margin-bottom:8px;
font-size:28px;
}

.subtitle{
text-align:center;
color:#94a3b8;
font-size:14px;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
background:#1f2937;
border:1px solid #374151;
border-radius:10px;
color:white;
font-size:15px;
}

input:focus{
outline:none;
border-color:#2563eb;
}

button{
width:100%;
padding:14px;
background:#2563eb;
border:none;
border-radius:10px;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1d4ed8;
}

.message{
margin-top:15px;
text-align:center;
font-size:14px;
}

.footer{
margin-top:20px;
text-align:center;
color:#94a3b8;
font-size:14px;
}

.footer a{
color:#60a5fa;
text-decoration:none;
font-weight:bold;
}

.footer a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="logo-transparent.png" alt="Tradeva Logo">
</div>

<h1>Create Account</h1>

<p class="subtitle">
Start tracking your trades like a professional trader.
</p>

<form id="registerForm">

<input
id="fullname"
type="text"
placeholder="Full Name"
required>

<input
id="email"
type="email"
placeholder="Email Address"
required>

<input
id="password"
type="password"
placeholder="Password"
required>

<input
id="confirmPassword"
type="password"
placeholder="Confirm Password"
required>

<button type="submit">
Create Account
</button>

<div id="message" class="message"></div>

</form>

<div class="footer">
Already have an account?
<a href="login.html">Login</a>
</div>

</div>

</body>
</html>
