
<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tradeva - Create Account</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f8fafc;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}
.container{
width:100%;
max-width:450px;
background:white;
padding:40px;
border-radius:24px;
border:1px solid #e5e7eb;
box-shadow:
0 20px 60px rgba(0,0,0,0.08);
}
.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:90px;
height:auto;
}

h1{
color:#111827;
text-align:center;
margin-bottom:8px;
font-size:32px;
font-weight:700;
}
.subtitle{
text-align:center;
color:#6b7280;
font-size:15px;
margin-bottom:30px;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
background:#1f2937;
border:1px solid #374151;
border-radius:10px;
color:white;
font-size:15px;
}

input:focus{
outline:none;
border-color:#2563eb;
}

button{
width:100%;
padding:14px;
background:#2563eb;
border:none;
border-radius:10px;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1d4ed8;
}

.message{
margin-top:15px;
text-align:center;
font-size:14px;
}

.footer{
margin-top:20px;
text-align:center;
color:#94a3b8;
font-size:14px;
}

.footer a{
color:#60a5fa;
text-decoration:none;
font-weight:bold;
}

.footer a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="logo-transparent.png" alt="Tradeva Logo">
</div>

<h1>Create Account</h1>

<p class="subtitle">
Start tracking your trades like a professional trader.
</p>

<form id="registerForm">

<input
id="fullname"
type="text"
placeholder="Full Name"
required>

<input
id="email"
type="email"
placeholder="Email Address"
required>

<input
id="password"
type="password"
placeholder="Password"
required>

<input
id="confirmPassword"
type="password"
placeholder="Confirm Password"
required>

<button type="submit">
Create Account
</button>

<div id="message" class="message"></div>

</form>

<div class="footer">
Already have an account?
<a href="login.html">Login</a>
</div>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
sendEmailVerification,
updateProfile
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDsaMzX6_NlzwsD3ibeYghv3q8HTbytmmU",
authDomain: "tradeva-app.firebaseapp.com",
projectId: "tradeva-app",
storageBucket: "tradeva-app.firebasestorage.app",
messagingSenderId: "682302343296",
appId: "1:682302343296:web:9643bf7b4b6664482e3e65"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const form = document.getElementById("registerForm");
const message = document.getElementById("message");

form.addEventListener("submit", async (e) => {

e.preventDefault();

const fullname = document.getElementById("fullname").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
const confirmPassword = document.getElementById("confirmPassword").value;

if(password !== confirmPassword){
message.style.color = "#ef4444";
message.innerText = "Passwords do not match";
return;
}

try {

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

await updateProfile(
userCredential.user,
{
displayName: fullname
}
);

await sendEmailVerification(
userCredential.user
);

message.style.color = "#22c55e";
message.innerText =
"Account created successfully! Check your email for verification.";

form.reset();

}
catch(error){

message.style.color = "#ef4444";
message.innerText = error.message;

}

});

</script>
</body>
</html>
