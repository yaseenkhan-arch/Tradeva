
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tradeva Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 30px;
background:#111827;
border-bottom:1px solid #1f2937;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:22px;
font-weight:bold;
}

.logo img{
width:40px;
}

.logout-btn{
background:#ef4444;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.dashboard{
padding:30px;
}

.welcome{
margin-bottom:30px;
}

.welcome h1{
font-size:32px;
margin-bottom:10px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#111827;
padding:25px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.card h3{
color:#94a3b8;
font-size:14px;
margin-bottom:10px;
}

.card p{
font-size:30px;
font-weight:bold;
}

.section{
background:#111827;
padding:25px;
border-radius:15px;
margin-bottom:25px;
}

.section h2{
margin-bottom:20px;
}

.add-btn{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
text-align:left;
padding:12px;
border-bottom:1px solid #374151;
color:#94a3b8;
}

table td{
padding:12px;
border-bottom:1px solid #1f2937;
}

.profit{
color:#22c55e;
font-weight:bold;
}

.loss{
color:#ef4444;
font-weight:bold;
}

@media(max-width:768px){

.dashboard{
padding:15px;
}

.welcome h1{
font-size:24px;
}

.card p{
font-size:24px;
}

table{
font-size:13px;
}

}
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:#111827;
padding:25px;
border-radius:15px;
width:90%;
max-width:500px;
max-height:90vh;
overflow-y:auto;
}

.modal-content h2{
color:white;
margin-bottom:20px;
}

.modal-content input,
.modal-content select,
.modal-content textarea{
width:100%;
padding:12px;
margin-bottom:12px;
background:#1f2937;
border:1px solid #374151;
color:white;
border-radius:8px;
}

.modal-content button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.close{
float:right;
font-size:28px;
cursor:pointer;
color:white;
}</style>
</head>

<body>

<div class="navbar">

<div class="logo">
<img src="logo-transparent.png">
<span>Tradeva</span>
</div>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</div>

<div class="dashboard">

<div class="welcome">
<h1>Welcome Trader 👋</h1>
<p>Your performance overview</p>
</div>

<div class="stats">

<div class="card">
<h3>Total Trades</h3>
<p>0</p>
</div>

<div class="card">
<h3>Win Rate</h3>
<p>0%</p>
</div>

<div class="card">
<h3>Profit Factor</h3>
<p>0.00</p>
</div>

<div class="card">
<h3>Net PnL</h3>
<p>$0</p>
</div>

</div>

<div class="section">

<h2>Recent Trades</h2>

<button class="add-trade-btn" onclick="openTradeModal()">
  + Add Trade
</button>
<table>

<tr>
<th>Pair</th>
<th>Result</th>
<th>RR</th>
</tr>

<tr>
<td>EURUSD</td>
<td class="profit">Win</td>
<td>+2R</td>
</tr>

<tr>
<td>GBPUSD</td>
<td class="loss">Loss</td>
<td>-1R</td>
</tr>

</table>

</div>

<div class="section">

<h2>AI Review</h2>

<p>
No trades available yet.
Add your first trade and Tradeva AI will review it.
</p>

</div>

</div>

<script>

function logout(){
localStorage.clear();
window.location.href="login.html";
}

function openTradeModal(){
document.getElementById("tradeModal").style.display="flex";
}

function closeTradeModal(){
document.getElementById("tradeModal").style.display="none";
}

document.addEventListener("DOMContentLoaded", () => {

const form = document.getElementById("tradeForm");

form.addEventListener("submit",(e)=>{

e.preventDefault();

alert("Trade Saved Successfully ✅");

closeTradeModal();

form.reset();

});

});

</script>
  <!-- Add Trade Modal -->

<div id="tradeModal" class="modal">

  <div class="modal-content">

    <span class="close" onclick="closeTradeModal()">&times;</span>

    <h2>Add New Trade</h2>

    <form id="tradeForm">

      <input type="date" id="date" required>

      <input type="text" id="pair" placeholder="Pair (EURUSD)" required>

      <select id="direction">
        <option>Buy</option>
        <option>Sell</option>
      </select>

      <select id="session">
        <option>Asia</option>
        <option>London</option>
        <option>New York</option>
      </select>

      <select id="tradeType">
        <option>Scalp</option>
        <option>Intraday</option>
        <option>Swing</option>
      </select>

      <select id="htfBias">
        <option>Bullish</option>
        <option>Bearish</option>
        <option>Neutral</option>
      </select>

      <input type="number" id="rr" placeholder="RR">

      <input type="number" id="pips" placeholder="Pips">

      <input type="text" id="timeInPosition" placeholder="Time in Position">

      <select id="result">
        <option>Win</option>
        <option>Loss</option>
        <option>Breakeven</option>
      </select>

      <textarea
        id="notes"
        placeholder="Trade Notes"
        rows="4"></textarea>

      <button type="submit">
        Save Trade
      </button>

    </form>

  </div>

</div>
</body>
</html>
