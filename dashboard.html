
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tradeva Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#F8FAFC;
}

.dashboard{
display:flex;
min-height:100vh;
}

/* MAIN AREA */

.main-content{
flex:1;
padding:40px;
}

.main-content h1{
font-size:32px;
}

/* RIGHT SIDEBAR */

.sidebar{
width:320px;
background:white;
border-left:1px solid #eee;
padding:25px;
}

/* PROFILE */

.profile-card{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
padding-bottom:20px;
border-bottom:1px solid #eee;
}

.profile-left{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:50px;
height:50px;
border-radius:50%;
background:#7C5CFF;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
}

.profile-info h3{
font-size:16px;
}

.profile-info p{
font-size:13px;
color:#777;
}

.arrow{
font-size:24px;
color:#999;
}

/* MENU */

.menu{
display:flex;
flex-direction:column;
gap:8px;
}

.menu-item{
padding:14px;
border-radius:12px;
cursor:pointer;
font-weight:500;
}

.menu-item.active{
background:#F3EEFF;
color:#7C5CFF;
}

.section-title{
margin-top:25px;
margin-bottom:10px;
font-size:12px;
font-weight:bold;
color:#9CA3AF;
text-transform:uppercase;
}

</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest">
  </script>  
</head>

<body>

<div class="dashboard">

<div class="main-content">
<h1>Dashboard Content Coming Soon 🚀</h1>
</div>

<div class="sidebar">

<div class="profile-card">

<div class="profile-left">

<div class="avatar">RF</div>

<div class="profile-info">
<h3>Romantic Fouji</h3>
<p>View Profile</p>
</div>

</div>

<div class="arrow">›</div>

</div>

<div class="menu">

<div class="menu-item active">Dashboard</div>
<div class="menu-item">Trades</div>
<div class="menu-item">Analytics</div>
<div class="menu-item">Profit Calendar</div>
<div class="menu-item">Charts & News</div>
<div class="menu-item">Mood Correlation</div>

<div class="section-title">Planning</div>

<div class="menu-item">Weekly Planner</div>
<div class="menu-item">Mood Tracker</div>

<div class="section-title">Growth</div>

<div class="menu-item">Reviews</div>
<div class="menu-item">Milestones</div>
<div class="menu-item">Knowledge Base</div>

</div>

</div>

</div>

</body>
</html>
